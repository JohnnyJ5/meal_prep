steps:
  # 1. Build the container image
  - id: 'build-main'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/meal-prep', '.']

  # 2. Push the image to Artifact Registry
  - id: 'push-main'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/meal-prep']
    waitFor: ['build-main']

  # 3. Deploy to Cloud Run
  - id: 'deploy-main'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    waitFor: ['push-main']
    args:
      - 'run'
      - 'deploy'
      - 'meal-prep'
      - '--image'
      - 'gcr.io/$PROJECT_ID/meal-prep'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'DB_PATH=/mnt/db/meals.db'
      - '--add-volume'
      - 'name=db-volume,type=cloud-storage,bucket=meal-prep-db-bucket'
      - '--add-volume-mount'
      - 'volume=db-volume,mount-path=/mnt/db'
      - '--update-secrets'
      - '/secrets_calendar/calendar_credentials.json=calendar-credentials:latest'

  # 4. Build the db-dump-job image (runs in parallel with main build)
  - id: 'build-db-job'
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['-']
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/db-dump-job', '-f', 'db_job/Dockerfile.job', 'db_job']

  # 5. Push the db-dump-job image
  - id: 'push-db-job'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/db-dump-job']
    waitFor: ['build-db-job']

  # 6. Deploy the db-dump-job Cloud Run Job
  - id: 'deploy-db-job'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    waitFor: ['push-db-job']
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'db-dump-job'
      - '--image'
      - 'gcr.io/$PROJECT_ID/db-dump-job'
      - '--region'
      - 'us-central1'
      - '--set-env-vars'
      - 'DB_PATH=/mnt/db/meals.db'
      - '--add-volume'
      - 'name=db-volume,type=cloud-storage,bucket=meal-prep-db-bucket'
      - '--add-volume-mount'
      - 'volume=db-volume,mount-path=/mnt/db'

images:
  - 'gcr.io/$PROJECT_ID/meal-prep'
  - 'gcr.io/$PROJECT_ID/db-dump-job'
