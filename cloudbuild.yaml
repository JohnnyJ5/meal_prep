steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/meal-prep', '.']

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/meal-prep']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'meal-prep'
      - '--image'
      - 'gcr.io/$PROJECT_ID/meal-prep'
      - '--region'
      - 'us-central1' # Change to your preferred region
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'DB_PATH=/mnt/db/meals.db'
      # This assumes you have already created the bucket and will mount it manually or via gcloud
      # Note: Mounting GCS volumes in Cloud Run is currently done via --add-volume and --add-volume-mount

images:
  - 'gcr.io/$PROJECT_ID/meal-prep'
