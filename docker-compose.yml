version: '3.8'

services:
  meal_prep_dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: build-env
    container_name: meal_prep_dev
    ports:
      - "2222:22"
      - "8080:8080"
    volumes:
      - ./:/home/devuser/meal_prep
      - ~/.meal_prep:/home/devuser/.meal_prep:ro
    environment:
      - TERM=xterm-256color
      - GOOGLE_REDIRECT_URI=http://localhost:8080/auth/google/callback
    tty: true
    stdin_open: true
    restart: unless-stopped
    networks:
      - meal_prep_network

networks:
  meal_prep_network:
    driver: bridge
