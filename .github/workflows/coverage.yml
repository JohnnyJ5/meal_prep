name: coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Minimum acceptable line coverage percentage
  COVERAGE_THRESHOLD: 50

jobs:
  coverage:
    name: code coverage (lcov)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            lcov \
            libssl-dev \
            libboost-dev \
            libcurl4-openssl-dev \
            libsqlite3-dev

      - name: Cache CMake FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-gcc-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-gcc-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc \
            -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

      - name: Generate coverage report
        run: |
          lcov \
            --capture \
            --directory build \
            --output-file coverage_raw.info \
            --rc lcov_branch_coverage=1

          # Strip third-party and system headers
          lcov \
            --remove coverage_raw.info \
              '/usr/*' \
              '*/build/_deps/*' \
              '*/tests/*' \
            --output-file coverage.info \
            --rc lcov_branch_coverage=1

          lcov --summary coverage.info --rc lcov_branch_coverage=1

      - name: Check coverage threshold
        run: |
          LINE_COV=$(lcov --summary coverage.info 2>&1 \
            | grep -oP 'lines\.*: \K[0-9]+\.[0-9]+')
          echo "Line coverage: ${LINE_COV}%  (threshold: ${COVERAGE_THRESHOLD}%)"
          python3 -c "
          import sys
          cov = float('${LINE_COV}')
          threshold = float('${COVERAGE_THRESHOLD}')
          if cov < threshold:
              print(f'FAIL: {cov:.1f}% < {threshold}%')
              sys.exit(1)
          print(f'PASS: {cov:.1f}% >= {threshold}%')
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lcov-report
          path: coverage.info
