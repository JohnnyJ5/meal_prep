name: clang-format

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Run clang-format
        run: |
          chmod +x scripts/clang-format.sh
          ./scripts/clang-format.sh
