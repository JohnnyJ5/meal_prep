name: sanitizers

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  asan-ubsan:
    name: AddressSanitizer + UBSan
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            clang \
            libssl-dev \
            libboost-dev \
            libcurl4-openssl-dev \
            libsqlite3-dev

      - name: Cache CMake FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DENABLE_ASAN=ON \
            -DENABLE_UBSAN=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1:abort_on_error=1
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            clang \
            libssl-dev \
            libboost-dev \
            libcurl4-openssl-dev \
            libsqlite3-dev

      - name: Cache CMake FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DENABLE_TSAN=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)
